<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Clientes · Ricopan</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    :root {
      --navy:    #0d1b2a;
      --navy2:   #1b2838;
      --navy3:   #243447;
      --red:     #c0392b;
      --red2:    #e74c3c;
      --red-light: #f1948a;
      --white:   #ffffff;
      --gray:    #7f8c9a;
      --green:   #27ae60;
      --green2:  #2ecc71;
      --orange:  #e67e22;
      --yellow:  #f1c40f;
      --blue:    #3498db;
      --shadow:  0 8px 32px rgba(0,0,0,0.5);
      --radius:  16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, var(--navy) 0%, var(--navy2) 60%, var(--navy3) 100%);
      min-height: 100vh;
      color: var(--white);
      overscroll-behavior: none;
    }

    #loading {
      position: fixed; inset: 0;
      background: var(--navy);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 18px;
    }
  </style>
</head>
<body>
  <div id="loading"><div style="font-size:40px;margin:20px;">🍞 Ricopan Clientes</div></div>
  <div id="app"></div>
  <script>
    // Application is loading...
    document.querySelector('#loading').innerHTML = '<div style="text-align:center;padding:40px;"><div style="font-size:40px;margin:20px;">🍞</div><h1>Clientes · Ricopan</h1><p>Sistema de gestión de pedidos para clientes</p></div>';
  </script>
</body>
</html>
