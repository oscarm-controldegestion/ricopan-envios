    header{background:linear-gradient(135deg,#c0392b,#922b21);color:#fff;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
    .header-left{display:flex;align-items:center;gap:.6rem}
    .header-icon{font-size:1.5rem}
    .header-title{font-size:1rem;font-weight:700}
    .login-logo{width:140px;height:auto;display:block;margin:0 auto .5rem;border-radius:8px}
    .login-frase{font-size:.82rem;color:#c0392b;font-style:italic;font-weight:600;margin-bottom:1rem;line-height:1.4;padding:0 .5rem}

    /* ---- LAYOUT ---- */

    .page{display:none}

    /* ---- STATS ---- */

    .field label{display:block;font-size:.82rem;font-weight:600;color:#555;margin-bottom:.3rem}

    /* ---- TIMELINE ---- */

    /* ---- ACCION BOX ---- */

    .foto-btn{display:flex;align-items:center;gap:.45rem;margin-top:.55rem;cursor:pointer;background:#fff;border:1.5px dashed #aaa;border-radius:8px;padding:.45rem .75rem;font-size:.82rem;color:#555;width:100%;justify-content:center;transition:border-color .2s}
    .foto-btn:hover{border-color:#c0392b;color:#c0392b}

    .foto-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:.55rem;display:none;border:1.5px solid #f5c2c7}
    .tl-foto{margin-top:.45rem;max-width:220px;border-radius:8px;cursor:pointer;border:1px solid #ddd}
    .foto-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center}

    .radio-opt label{font-size:.88rem;font-weight:600;cursor:pointer}

    /* ---- ALERTAS ---- */
    .alert{padding:.7rem .9rem;border-radius:8px;font-size:.85rem;margin-bottom:.85rem}
    .alert-info{background:#cfe2ff;color:#084298;border:1px solid #b6d4fe}

    /* ---- TABS ADMIN ---- */
    .tabs{display:flex;border-bottom:2px solid #eee;margin-bottom:1rem}
    .tab-btn{padding:.55rem 1.1rem;background:none;border:none;font-size:.88rem;font-weight:600;color:#888;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}

    /* ---- TABLAS ADMIN ---- */

    /* ---- LOADING ---- */

    .spin{font-size:2.5rem;animation:spin 1s linear infinite;margin-bottom:.75rem}

    /* ---- RESPONSIVE ---- */
    @media(max-width:560px){
      .form-row{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
      .header-user{display:none}
    }
  </style>
</head>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBs2LUVSVSWBwuzet8hqAhM4PUOatmDjIo",
  authDomain:        "larusia-apps.firebaseapp.com",

<!-- ============================================================
     APLICACION
     ============================================================ -->
<script>
// ---- INICIALIZAR FIREBASE ----
firebase.initializeApp(FIREBASE_CONFIG);
const DB = firebase.database();

// ---- DATOS POR DEFECTO ----
const DEFAULT_USERS = {
  admin:           { pass:'admin123',  role:'admin',      name:'Administrador',       local:null },
  genesis:         { pass:'1234',      role:'encargado',  name:'Genesis',             local:'gabriel' },
  recep_larrain:   { pass:'1234',      role:'receptor',   name:'Recepción Larraín',   local:'larrain' },
  recep_abuelo:    { pass:'1234',      role:'receptor',   name:'Recepción Abuelo',    local:'abuelo' },
  recep_pasteleria:{ pass:'1234',      role:'receptor',   name:'Recepción Pastelería',local:'pasteleria' },
  dilan:           { pass:'1234',      role:'conductor',  name:'Dilan',               local:null },
  lorrain:         { pass:'1234',      role:'conductor',  name:'Lorrain',             local:null },
};
const DEFAULT_LOCALES = {
  gabriel:'Gabriel', larrain:'Larraín', abuelo:'Abuelo', pasteleria:'Pastelería', central:'Central'
};
const DEFAULT_PRODUCTOS = [
  'Pino','Mechada','Chapa Trad','Chapa Napo',
  'Empa Napo','Empa Mechada','Empa Pollo','Pan','Torta','Otro'
];

// ---- ESTADO ----
let CU = null; // currentUser
let DATA = { users:{}, locales:{}, productos:[], envios:{} };
let prodRowCount = 0;
let currentEnvioId = null;
let listenersActive = false;

// ---- HELPERS ----
const roleLabel = r => ({admin:'Admin',encargado:'Envío',conductor:'Conductor',receptor:'Recepción'}[r]||r);
const fmt = ts => new Date(ts).toLocaleString('es-CL');
const fmtDate = ts => new Date(ts).toLocaleDateString('es-CL');
const fmtTime = ts => new Date(ts).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});

// ---- INICIALIZAR DATOS EN FIREBASE (primera vez) ----
async function initFirebaseData() {
  const [usersSnap, localesSnap, prodSnap] = await Promise.all([
    DB.ref('ricopan/users').get(),
    DB.ref('ricopan/locales').get(),
    DB.ref('ricopan/productos').get()
  ]);
  const updates = {};
  if (!usersSnap.exists())   updates['ricopan/users']    = DEFAULT_USERS;
  if (!localesSnap.exists()) updates['ricopan/locales']  = DEFAULT_LOCALES;
  if (!prodSnap.exists())    updates['ricopan/productos'] = DEFAULT_PRODUCTOS;
  if (Object.keys(updates).length) await DB.ref().update(updates);
}

// ---- LISTENERS EN TIEMPO REAL ----
function startListeners() {
  if (listenersActive) return;
  listenersActive = true;
  DB.ref('ricopan/users').on('value', s => { DATA.users = s.val()||{}; });
  DB.ref('ricopan/locales').on('value', s => { DATA.locales = s.val()||{}; renderIfDashboard(); });
  DB.ref('ricopan/productos').on('value', s => { DATA.productos = s.val()||[]; });
  DB.ref('ricopan/envios').on('value', s => { DATA.envios = s.val()||{}; renderIfDashboard(); });
}

function renderIfDashboard() {
  if (document.getElementById('pg-dashboard').classList.contains('on')) renderDashboard();
}

// ---- ARRANQUE ----
window.addEventListener('load', async () => {
  const overlay = document.getElementById('loading-overlay');
  try {
    await initFirebaseData();
    startListeners();
    // Esperar a que lleguen datos
    await new Promise(r => setTimeout(r, 600));
  } catch(e) {
    console.error('Firebase error:', e);
    // Continuar igual (modo offline con datos en memoria)
  }
  overlay.style.display = 'none';
  loadEmailConfig();
  checkReporteDiario();

  // Restaurar sesión
  const saved = sessionStorage.getItem('ricopan_cu');
  if (saved) {
    CU = JSON.parse(saved);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('hdr-user').textContent = CU.name + ' · ' + roleLabel(CU.role);
    goTo('dashboard');
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
});

// ---- LOGIN ----
function doLogin() {
  const user = document.getElementById('u-user').value.trim().toLowerCase();
  const pass = document.getElementById('u-pass').value;
  const err  = document.getElementById('login-err');

  const u = DATA.users[user];
  if (u && u.pass === pass) {
    CU = { id:user, ...u };
    sessionStorage.setItem('ricopan_cu', JSON.stringify(CU));
    err.style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('hdr-user').textContent = CU.name + ' · ' + roleLabel(CU.role);
    goTo('dashboard');
  } else {
    err.textContent = 'Usuario o contraseña incorrectos';
    err.style.display = 'block';
  }
}

function doLogout() {
  CU = null;
  sessionStorage.removeItem('ricopan_cu');
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('u-user').value = '';
  document.getElementById('u-pass').value = '';
}

document.addEventListener('keypress', e => {
  if (e.key==='Enter') {
    if (document.getElementById('login-screen').style.display!=='none') doLogin();
  }
});

// ---- NAVEGACION ----
function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-'+page).classList.add('on');
  window.scrollTo(0,0);
  if (page==='dashboard') renderDashboard();
  if (page==='nuevo')     renderNuevo();
  if (page==='admin')     adminTab('usuarios', document.querySelector('.tab-btn'));
}

// ---- STATUS ----
function badge(status) {
  const map = {
    pendiente_retiro:'<span class="badge b-pendiente">⏳ Pend. retiro</span>',
    en_transito:     '<span class="badge b-transito">🚚 En tránsito</span>',
    entregado:       '<span class="badge b-entregado">📦 Entregado</span>',
    completado:      '<span class="badge b-completado">✅ Completado</span>',
    reclamado:       '<span class="badge b-reclamado">⚠️ Reclamado</span>',
  };
  return map[status]||`<span class="badge">${status}</span>`;
}

function envioCard(id, e) {
  const L = DATA.locales;
  const U = DATA.users;
  const origen  = L[e.senderLocal]  || e.senderLocal  || '-';
  const destino = L[e.destinoLocal] || e.destinoLocal || '-';
  const driver  = U[e.driverId];
  const total   = (e.products||[]).reduce((s,p)=>s+(+p.cantidad||0),0);
  return `
  <div class="envio-item" onclick="verEnvio('${id}')">
    <div class="envio-head">
      <div>
        <div class="envio-ruta">${origen} → ${destino}</div>
        <div class="envio-sub">${fmtDate(e.createdAt)} ${fmtTime(e.createdAt)} · ${driver?.name||'?'} · ${total} unid.</div>
        <div class="envio-sub">#${id.slice(-5).toUpperCase()}</div>
      </div>

    </div>

    <p style="font-size:.82rem;color:#555;margin-bottom:.8rem">Descarga el reporte de cualquier día en PDF o Excel sin necesidad de email.</p>
    <div class="form-row">
      <div class="field"><label>Fecha</label><input type="date" id="rep-fecha" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>Local</label><select id="rep-local"><option value="">— Todos los locales —</option>${Object.entries(DATA.locales).map(([id,n])=>'<option value="'+id+'">'+n+'</option>').join('')}</select></div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem">
      <button class="btn btn-danger" onclick="descargarReporte('pdf')">&#128196; Descargar PDF</button>
      <button class="btn btn-success" onclick="descargarReporte('excel')">&#128202; Descargar Excel</button>
    </div>
  </div>
  </div>`;
}
function descargarReporte(tipo) {
  const fechaInput = document.getElementById('rep-fecha');
  const localInput = document.getElementById('rep-local');
  const fecha = fechaInput ? fechaInput.value : new Date().toISOString().slice(0,10);
  const localId = localInput ? localInput.value : '';
  if (!fecha) { alert('Selecciona una fecha'); return; }
  const [y,m,d] = fecha.split('-');
  const inicio = new Date(+y,+m-1,+d,0,0,0).getTime();
  const fin = new Date(+y,+m-1,+d,23,59,59).getTime();
  let enviosFiltrados = Object.entries(DATA.envios).filter(([,e])=> e.createdAt>=inicio && e.createdAt<=fin);
  const localNombre = localId ? (DATA.locales[localId]||localId) : 'Todos los locales';
  if (localId) enviosFiltrados = enviosFiltrados.filter(([,e])=> e.senderLocal===localId || e.destinoLocal===localId);
  if (!enviosFiltrados.length) { alert('No hay envíos para esa fecha/local'); return; }
  if (tipo === 'pdf') {
    const doc = generarPDFReporte(fecha, localId||'todos', localNombre, enviosFiltrados);
    doc.save('reporte_'+fecha+'_'+(localId||'todos')+'.pdf');
  } else {
    var b64 = generarExcelReporte(fecha, localId||'todos', localNombre, enviosFiltrados);
    var bytes = atob(b64);
    var arr = new Uint8Array(bytes.length);
    for(var i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
    var blob = new Blob([arr],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'reporte_'+fecha+'_'+(localId||'todos')+'.xlsx';
    a.click(); URL.revokeObjectURL(a.href);
  }
}

  const envios = Object.entries(DATA.envios).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));

}

function addProdRow() {
  prodRowCount++;
  const id = prodRowCount;
  const opts = (DATA.productos||[]).map(p=>`<option value="${p}">${p}</option>`).join('');
  const div = document.createElement('div');
  div.id = `pr-${id}`;
  div.className = 'prod-row';
  div.innerHTML = `
    <select id="pn-${id}"><option value="">Producto...</option>${opts}</select>
    <input type="number" id="pq-${id}" placeholder="Cantidad" min="1">
    <button class="btn-del" onclick="document.getElementById('pr-${id}').remove()">✕</button>`;

async function crearEnvio() {
  const destino   = document.getElementById('n-destino').value;
  const conductor = document.getElementById('n-conductor').value;
  const nota      = document.getElementById('n-nota').value.trim();

  if (!destino)   { alert('Selecciona el local de destino'); return; }
  if (!conductor) { alert('Selecciona el conductor'); return; }

  const products = [];
  for (let i = 1; i <= prodRowCount; i++) {
    const n = document.getElementById(`pn-${i}`)?.value;
    const q = parseInt(document.getElementById(`pq-${i}`)?.value);
    if (n && q > 0) products.push({ producto:n, cantidad:q });
  }
  if (!products.length) { alert('Agrega al menos un producto con cantidad'); return; }

  const now = Date.now();
  const envio = {
    senderLocal: CU.local, senderUserId: CU.id, senderUserName: CU.name,
    destinoLocal: destino, driverId: conductor,
    products, nota, status:'pendiente_retiro', createdAt: now,
    timeline:[{ action:'creado', userId:CU.id, userName:CU.name, timestamp:now, note:`Envío creado por ${CU.name}` }]
  };

  try {
    await DB.ref('ricopan/envios').push(envio);
    alert('✅ Envío creado exitosamente');
    goTo('dashboard');
  } catch(e) { alert('Error: '+e.message); }
}

// ---- FOTO HELPERS ----
function previsualizarFoto(input) {
  const preview = document.getElementById('foto-preview');
  const lbl = document.getElementById('foto-lbl') || input.closest('label');
  if (!input.files?.length) { preview.style.display='none'; return; }
  const reader = new FileReader();
  reader.onload = e => {
    preview.src = e.target.result;
    preview.style.display = 'block';
    if (lbl) lbl.textContent = '✅ Foto adjuntada (toca para cambiar)';
  };
  reader.readAsDataURL(input.files[0]);
}

function abrirFoto(src) {
  const modal = document.getElementById('foto-modal');
  document.getElementById('foto-modal-img').src = src;
  modal.classList.add('open');
}

async function comprimirFoto(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900;
        let w = img.width, h = img.height;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ---- ACCIONES ----
async function accion(tipo, id) {
  const nota  = document.getElementById('act-nota')?.value?.trim() || '';
  const fInp  = document.getElementById('act-foto');
  const e     = DATA.envios[id];
  if (!e) return;

  // Comprimir foto si la hay
  let photoB64 = null;
  if (fInp?.files?.length) {
    try { photoB64 = await comprimirFoto(fInp.files[0]); } catch(_) {}
  }

  const now = Date.now();
  let newStatus, tlNote;

  if (tipo==='retiro') {
    newStatus = 'en_transito';
    tlNote = nota || 'Conductor confirmó el retiro';
  } else if (tipo==='entrega') {
    newStatus = 'entregado';
    tlNote = nota || 'Conductor confirmó la entrega';
  } else if (tipo==='recepcion') {
    newStatus = document.querySelector('input[name="re"]:checked')?.value || 'completado';
    tlNote = nota || (newStatus==='completado' ? 'Recepción confirmada' : 'Reclamo registrado');
  }

  const tlEntry = { action: tipo, userId: CU.id, userName: CU.name, timestamp: now, note: tlNote };
  if (photoB64) tlEntry.photo = photoB64;
  const timeline = [...(e.timeline||[]), tlEntry];

  try {
    await DB.ref(`ricopan/envios/${id}`).update({ status:newStatus, timeline, [`${tipo}At`]:now });
    if (newStatus === 'reclamado') {
      enviarAlertaDiferencia(id, {...e, status:newStatus}, tlNote);
    }
    verEnvio(id);
  } catch(err) { alert('Error: '+err.message); }
}

async function eliminarEnvio(id) {
  if (!confirm('¿Eliminar este envío? No se puede deshacer.')) return;
  await DB.ref(`ricopan/envios/${id}`).remove();
  goTo('dashboard');
}

// ---- REPORTE DIARIO ----
function getEnviosHoy() {
  const inicio = new Date(); inicio.setHours(0,0,0,0);
  const fin    = new Date(); fin.setHours(23,59,59,999);
  return Object.entries(DATA.envios).filter(([,e]) =>
    e.createdAt >= inicio.getTime() && e.createdAt <= fin.getTime()
  );
}

function generarPDFReporte(fecha, localId, localNombre, envios) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const L = DATA.locales, U = DATA.users;

  // Cabecera
  doc.setFillColor(192,57,43);
  doc.rect(0,0,210,18,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(13);
  doc.text('Control de Envíos - Ricopan', 10, 12);
  doc.setFontSize(9);
  doc.text(`Reporte diario: ${localNombre}  |  ${fecha}`, 10, 16);

  doc.setTextColor(0,0,0);
  let y = 26;

  // Resumen
  const compl = envios.filter(([,e])=>e.status==='completado').length;
  const recl  = envios.filter(([,e])=>e.status==='reclamado').length;
  const total = envios.length;
  doc.setFontSize(9);
  doc.setFont(undefined,'bold');
  doc.text(`Total movimientos: ${total}  |  Completados: ${compl}  |  Reclamados: ${recl}`, 10, y);
  doc.setFont(undefined,'normal');
  y += 8;

  // Tabla
  const rows = envios.map(([id,e]) => [
    id.slice(-6).toUpperCase(),
    L[e.senderLocal]||e.senderLocal||'-',
    L[e.destinoLocal]||e.destinoLocal||'-',
    U[e.driverId]?.name||'-',
    (e.products||[]).reduce((s,p)=>s+(+p.cantidad||0),0),
    e.status,
    fmtDate(e.createdAt)
  ]);

  doc.autoTable({
    startY: y,
    head: [['ID','Origen','Destino','Conductor','Unidades','Estado','Fecha']],
    body: rows,
    styles: { fontSize:7, cellPadding:1.5 },
    headStyles: { fillColor:[192,57,43], textColor:255, fontStyle:'bold' },
    alternateRowStyles: { fillColor:[250,245,245] }
  });

  // Detalle reclamados
  const reclamados = envios.filter(([,e])=>e.status==='reclamado');
  if (reclamados.length) {
    doc.setFontSize(10); doc.setFont(undefined,'bold');
    doc.text('⚠️ Envíos con reclamo:', 10, doc.lastAutoTable.finalY+10);
    doc.setFont(undefined,'normal'); doc.setFontSize(8);
    let ry = doc.lastAutoTable.finalY+18;
    reclamados.forEach(([id,e]) => {
      const lastNote = [...(e.timeline||[])].reverse().find(t=>t.note)?.note || '-';
      doc.text(`• #${id.slice(-6).toUpperCase()}: ${lastNote}`, 14, ry);
      ry += 6;
    });
  }

  return doc;
}

function generarExcelReporte(fecha, localId, localNombre, envios) {
  const L = DATA.locales, U = DATA.users;
  const rows = envios.map(([id,e]) => ({
    'ID':          id.slice(-6).toUpperCase(),
    'Fecha':       fmtDate(e.createdAt),
    'Hora':        fmtTime(e.createdAt),
    'Origen':      L[e.senderLocal]||e.senderLocal||'-',
    'Destino':     L[e.destinoLocal]||e.destinoLocal||'-',
    'Conductor':   U[e.driverId]?.name||'-',
    'Productos':   (e.products||[]).map(p=>`${p.producto}(${p.cantidad})`).join(', '),
    'Unidades':    (e.products||[]).reduce((s,p)=>s+(+p.cantidad||0),0),
    'Estado':      e.status,
    'Observación': [...(e.timeline||[])].reverse().find(t=>t.note)?.note || ''
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:8},{wch:12},{wch:8},{wch:14},{wch:14},{wch:14},{wch:30},{wch:9},{wch:14},{wch:30}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, localNombre.slice(0,31));
  return XLSX.write(wb, {bookType:'xlsx', type:'base64'});
}

async function enviarReportePorLocal(fecha, localId, localNombre, envios) {
  try {
    if (!EJSCONFIG.publicKey || !EJSCONFIG.serviceId || !EJSCONFIG.templateReport) {
      console.warn('EmailJS no configurado, reporte no enviado para', localNombre);
      return false;
    }
    const pdfDoc    = generarPDFReporte(fecha, localId, localNombre, envios);
    const pdfBase64 = pdfDoc.output('datauristring').split(',')[1];
    const xlsBase64 = generarExcelReporte(fecha, localId, localNombre, envios);

    const compl = envios.filter(([,e])=>e.status==='completado').length;
    const recl  = envios.filter(([,e])=>e.status==='reclamado').length;

    await emailjs.send(EJSCONFIG.serviceId, EJSCONFIG.templateReport, {
      to_email:    EJSCONFIG.adminEmail,
      local_nombre: localNombre,
      fecha,
      total:       envios.length,
      completados: compl,
      reclamados:  recl,
      resumen:     envios.length ? `${envios.length} envíos: ${compl} completados, ${recl} reclamados` : 'Sin movimientos hoy',
      pdf_attachment:  pdfBase64,
      xlsx_attachment: xlsBase64
    });
    return true;
  } catch(err) { console.error('Error enviando reporte de', localNombre, err); return false; }
}

async function reporteDiario(manual=false) {
  const fecha = new Date().toLocaleDateString('es-CL');
  const hoy   = new Date().toISOString().slice(0,10);

  // Verificar si ya se envió hoy
  if (!manual) {
    const sentSnap = await DB.ref(`ricopan/reportes_enviados/${hoy}`).get();
    if (sentSnap.exists()) { console.log('Reporte diario ya enviado hoy'); return; }
  }

  const enviosHoy = getEnviosHoy();
  if (!enviosHoy.length && !manual) { console.log('Sin envíos hoy, reporte no enviado'); return; }

  const locales = DATA.locales;
  let enviados = 0;

  for (const [localId, localNombre] of Object.entries(locales)) {
    const enviosLocal = enviosHoy.filter(([,e]) =>
      e.senderLocal===localId || e.destinoLocal===localId
    );
    if (enviosLocal.length || manual) {
      const ok = await enviarReportePorLocal(fecha, localId, localNombre, enviosLocal);
      if (ok) enviados++;
    }
  }

  if (enviados > 0) {
    await DB.ref(`ricopan/reportes_enviados/${hoy}`).set({ sentAt: Date.now(), locales: enviados });
    console.log(`✅ Reporte diario enviado para ${enviados} locales`);
    if (manual) alert(`✅ Reporte enviado para ${enviados} local(es)`);
  } else if (manual) {
    alert('⚠️ Configure EmailJS en la pestaña Reportes para enviar correos');
  }
}

function checkReporteDiario() {
  const now  = new Date();
  const hora = now.getHours();
  if (hora >= 23) {
    setTimeout(() => reporteDiario(false), 2000);
  }
  // Verificar cada hora
  const msHastaHora = (60 - now.getMinutes()) * 60000;
  setTimeout(checkReporteDiario, msHastaHora);
}

  dc.innerHTML = '<div class="card-head"><span class="card-title">⬇️ Descargar Reporte</span></div>'    +'<p style="font-size:.82rem;color:#555;margin-bottom:.8rem">Descarga el reporte de cualquier día en PDF o Excel.</p>'    +'<div class="form-row"><div class="field"><label>Fecha</label>'    +'<input type="date" id="rep-fecha" value="'+new Date().toISOString().slice(0,10)+'"></div>'    +'<div class="field"><label>Local</label>'    +'<select id="rep-local"><option value="">— Todos —</option>'+lOpts+'</select></div></div>'    +'<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem">'    +'<button class="btn btn-danger" onclick="descargarReporte(\'pdf\')">&#128196; Descargar PDF</button> '    +'<button class="btn btn-success" onclick="descargarReporte(\'excel\')">&#128202; Descargar Excel</button>'    +'</div>';
  c.appendChild(dc);
}
</script>
</body>
</html>
