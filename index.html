  <style>

    /* ---- LOGIN ---- */

  2 .stat{background:#fff;border-radius:10px;padding:.75rem;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}

    /* ---- BADGES ---- */

    /* ---- BOTONES ---- */

    .field{margin-bottom:.9rem}

    /* ---- ACCION BOX ---- */

    /* ---- TABS ADMIN ---- */
    .tabs{display:flex;border-bottom:2px solid #eee;margin-bottom:1rem}
    .tab-btn{padding:.55rem 1.1rem;background:none;border:none;font-size:.88rem;font-weight:600;color:#888;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
    .tab-btn.on{color:#c0392b;border-bottom-color:#c0392b}

    /* ---- TABLAS ADMIN ---- */
    .adm-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .adm-table th,.adm-table td{padding:.45rem .65rem;text-align:left;border-bottom:1px solid #f0f0f0}
    .adm-table th{background:#f8f9fa;font-weight:700;color:#555}
    .adm-form{background:#f8f9fa;border-radius:8px;padding:1rem;margin-bottom:1rem}

    /* ---- EMPTY STATE ---- */
    .empty{text-align:center;padding:2.5rem 1rem;color:#aaa}
    .empty-icon{font-size:2.5rem;margin-bottom:.75rem}

    /* ---- LOADING ---- */
    #loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:sans-serif}
    .spin{font-size:2.5rem;animation:spin 1s linear infinite;margin-bottom:.75rem}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ---- RESPONSIVE ---- */
    @media(max-width:560px){
      .form-row{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
      .header-user{display:none}
    }
  </style>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBs2LUVSVSWBwuzet8hqAhM4PUOatmDjIo",
  authDomain:        "larusia-apps.firebaseapp.com",
  databaseURL:       "https://larusia-apps-default-rtdb.firebaseio.com/",
  projectId:         "larusia-apps",
  storageBucket:     "larusia-apps.firebasestorage.app",

<!-- ============================================================
     APLICACION
     ============================================================ -->
<script>
// ---- INICIALIZAR FIREBASE ----
firebase.initializeApp(FIREBASE_CONFIG);
const DB = firebase.database();

// ---- DATOS POR DEFECTO ----
const DEFAULT_USERS = {
  admin:           { pass:'admin123',  role:'admin',      name:'Administrador',       local:null },
  genesis:         { pass:'1234',      role:'encargado',  name:'Genesis',             local:'gabriel' },
  recep_larrain:   { pass:'1234',      role:'receptor',   name:'RecepciÃ³n LarraÃ­n',   local:'larrain' },
  recep_abuelo:    { pass:'1234',      role:'receptor',   name:'RecepciÃ³n Abuelo',    local:'abuelo' },
  recep_pasteleria:{ pass:'1234',      role:'receptor',   name:'RecepciÃ³n PastelerÃ­a',local:'pasteleria' },
  dilan:           { pass:'1234',      role:'conductor',  name:'Dilan',               local:null },
  lorrain:         { pass:'1234',      role:'conductor',  name:'Lorrain',             local:null },
};
const DEFAULT_LOCALES = {
  gabriel:'Gabriel', larrain:'LarraÃ­n', abuelo:'Abuelo', pasteleria:'PastelerÃ­a', central:'Central'
};
const DEFAULT_PRODUCTOS = [
  'Pino','Mechada','Chapa Trad','Chapa Napo',
  'Empa Napo','Empa Mechada','Empa Pollo','Pan','Torta','Otro'
];

// ---- ESTADO ----
let CU = null; // currentUser
let DATA = { users:{}, locales:{}, productos:[], envios:{} };
let prodRowCount = 0;
let currentEnvioId = null;
let listenersActive = false;

// ---- HELPERS ----
const roleLabel = r => ({admin:'Admin',encargado:'EnvÃ­o',conductor:'Conductor',receptor:'RecepciÃ³n'}[r]||r);
const fmt = ts => new Date(ts).toLocaleString('es-CL');
const fmtDate = ts => new Date(ts).toLocaleDateString('es-CL');
const fmtTime = ts => new Date(ts).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});

// ---- INICIALIZAR DATOS EN FIREBASE (primera vez) ----
async function initFirebaseData() {
  const [usersSnap, localesSnap, prodSnap] = await Promise.all([
    DB.ref('ricopan/users').get(),
    DB.ref('ricopan/locales').get(),
    DB.ref('ricopan/productos').get()
  ]);
  const updates = {};
  if (!usersSnap.exists())   updates['ricopan/users']    = DEFAULT_USERS;
  if (!localesSnap.exists()) updates['ricopan/locales']  = DEFAULT_LOCALES;
  if (!prodSnap.exists())    updates['ricopan/productos'] = DEFAULT_PRODUCTOS;
  if (Object.keys(updates).length) await DB.ref().update(updates);
}

// ---- LISTENERS EN TIEMPO REAL ----
function startListeners() {
  if (listenersActive) return;
  listenersActive = true;
  DB.ref('ricopan/users').on('value', s => { DATA.users = s.val()||{}; });
  DB.ref('ricopan/locales').on('value', s => { DATA.locales = s.val()||{}; renderIfDashboard(); });
  DB.ref('ricopan/productos').on('value', s => { DATA.productos = s.val()||[]; });
  DB.ref('ricopan/envios').on('value', s => { DATA.envios = s.val()||{}; renderIfDashboard(); });
}

function renderIfDashboard() {
  if (document.getElementById('pg-dashboard').classList.contains('on')) renderDashboard();
}

// ---- ARRANQUE ----
window.addEventListener('load', async () => {
  const overlay = document.getElementById('loading-overlay');
  try {
    await initFirebaseData();
    startListeners();
    // Esperar a que lleguen datos
    await new Promise(r => setTimeout(r, 600));
  } catch(e) {
    console.error('Firebase error:', e);
    // Continuar igual (modo offline con datos en memoria)
  }
  overlay.style.display = 'none';

  // Restaurar sesiÃ³n
  const saved = sessionStorage.getItem('ricopan_cu');
  if (saved) {
    CU = JSON.parse(saved);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('hdr-user').textContent = CU.name + ' Â· ' + roleLabel(CU.role);
    goTo('dashboard');
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
});

// ---- LOGIN ----
function doLogin() {
  const user = document.getElementById('u-user').value.trim().toLowerCase();
  const pass = document.getElementById('u-pass').value;
  const err  = document.getElementById('login-err');

  const u = DATA.users[user];
  if (u && u.pass === pass) {
    CU = { id:user, ...u };
    sessionStorage.setItem('ricopan_cu', JSON.stringify(CU));
    err.style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('hdr-user').textContent = CU.name + ' Â· ' + roleLabel(CU.role);
    goTo('dashboard');
  } else {
    err.textContent = 'Usuario o contraseÃ±a incorrectos';
    err.style.display = 'block';
  }
}

function doLogout() {
  CU = null;
  sessionStorage.removeItem('ricopan_cu');
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('u-user').value = '';
  document.getElementById('u-pass').value = '';
}

document.addEventListener('keypress', e => {
  if (e.key==='Enter') {
    if (document.getElementById('login-screen').style.display!=='none') doLogin();
  }
});

// ---- NAVEGACION ----
function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-'+page).classList.add('on');
  window.scrollTo(0,0);
  if (page==='dashboard') renderDashboard();
  if (page==='nuevo')     renderNuevo();
  if (page==='admin')     adminTab('usuarios', document.querySelector('.tab-btn'));
}

// ---- STATUS ----
function badge(status) {
  const map = {
    pendiente_retiro:'<span class="badge b-pendiente">â³ Pend. retiro</span>',
    en_transito:     '<span class="badge b-transito">ð En trÃ¡nsito</span>',
    entregado:       '<span class="badge b-entregado">ð¦ Entregado</span>',
    completado:      '<span class="badge b-completado">â Completado</span>',
    reclamado:       '<span class="badge b-reclamado">â ï¸ Reclamado</span>',
  };
  return map[status]||`<span class="badge">${status}</span>`;
}

// ---- CARD DE ENVIO ----
function envioCard(id, e) {
  const L = DATA.locales;
  const U = DATA.users;
  const origen  = L[e.senderLocal]  || e.senderLocal  || '-';
  const destino = L[e.destinoLocal] || e.destinoLocal || '-';
  const driver  = U[e.driverId];
  const total   = (e.products||[]).reduce((s,p)=>s+(+p.cantidad||0),0);
  return `
  <div class="envio-item" onclick="verEnvio('${id}')">
    <div class="envio-head">
      <div>
        <div class="envio-ruta">${origen} â ${destino}</div>
        <div class="envio-sub">${fmtDate(e.createdAt)} ${fmtTime(e.createdAt)} Â· ${driver?.name||'?'} Â· ${total} unid.</div>
        <div class="envio-sub">#${id.slice(-5).toUpperCase()}</div>
      </div>
      ${badge(e.status)}
    </div>
  </div>`;
}

// ---- DASHBOARD ----
function renderDashboard() {
  if (!CU) return;
  const envios = Object.entries(DATA.envios).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
  let html = '';
  if      (CU.role==='encargado')  html = dashEncargado(envios);
  else if (CU.role==='conductor')  html = dashConductor(envios);
  else if (CU.role==='receptor')   html = dashReceptor(envios);
  else if (CU.role==='admin')      html = dashAdmin(envios);
  document.getElementById('dashboard-content').innerHTML = html;
}

function dashEncargado(envios) {
  const mine = envios.filter(([,e])=>e.senderLocal===CU.local);
  const act  = mine.filter(([,e])=>!['completado','reclamado'].includes(e.status));

function addProdRow() {

  const div = document.createElement('div');
  div.id = `pr-${id}`;
  div.className = 'prod-row';
  div.innerHTML = `
    <select id="pn-${id}"><option value="">Producto...</option>${opts}</select>
    <input type="number" id="pq-${id}" placeholder="Cantidad" min="1">
    <button class="btn-del" onclick="document.getElementById('pr-${id}').remove()">â</button>`;

async function crearEnvio() {
  const destino   = document.getElementById('n-destino').value;
  const conductor = document.getElementById('n-conductor').value;
  const nota      = document.getElementById('n-nota').value.trim();

  if (!destino)   { alert('Selecciona el local de destino'); return; }
  if (!conductor) { alert('Selecciona el conductor'); return; }

  const products = [];
  for (let i = 1; i <= prodRowCount; i++) {
    const n = document.getElementById(`pn-${i}`)?.value;
    const q = parseInt(document.getElementById(`pq-${i}`)?.value);
    if (n && q > 0) products.push({ producto:n, cantidad:q });
  }
  if (!products.length) { alert('Agrega al menos un producto con cantidad'); return; }

  const now = Date.now();
  const envio = {
    senderLocal: CU.local, senderUserId: CU.id, senderUserName: CU.name,
    destinoLocal: destino, driverId: conductor,
    products, nota, status:'pendiente_retiro', createdAt: now,
    timeline:[{ action:'creado', userId:CU.id, userName:CU.name, timestamp:now, note:`EnvÃ­o creado por ${CU.name}` }]
  };

  try {
    await DB.ref('ricopan/envios').push(envio);
    alert('â EnvÃ­o creado exitosamente');
    goTo('dashboard');
  } catch(e) { alert('Error: '+e.message); }
}

// ---- ACCIONES ----
async function accion(tipo, id) {
  const nota = document.getElementById('act-nota')?.value?.trim() || '';
  const e    = DATA.envios[id];
  if (!e) return;

  const now = Date.now();
  let newStatus, tlNote;

  if (tipo==='retiro') {
    newStatus = 'en_transito';
    tlNote = nota || 'Conductor confirmÃ³ el retiro';
  } else if (tipo==='entrega') {
    newStatus = 'entregado';
    tlNote = nota || 'Conductor confirmÃ³ la entrega';
  } else if (tipo==='recepcion') {
    newStatus = document.querySelector('input[name="re"]:checked')?.value || 'completado';
    tlNote = nota || (newStatus==='completado' ? 'RecepciÃ³n confirmada' : 'Reclamo registrado');
  }

  const timeline = [...(e.timeline||[]), {
    action: tipo, userId: CU.id, userName: CU.name, timestamp: now, note: tlNote
  }];

  try {
    await DB.ref(`ricopan/envios/${id}`).update({ status:newStatus, timeline, [`${tipo}At`]:now });
    verEnvio(id);
  } catch(err) { alert('Error: '+err.message); }
}

async function eliminarEnvio(id) {
  if (!confirm('Â¿Eliminar este envÃ­o? No se puede deshacer.')) return;
  await DB.ref(`ricopan/envios/${id}`).remove();

}

async function saveUser() {
  const n = document.getElementById('nu-n').value.trim();
  const u = document.getElementById('nu-u').value.trim().toLowerCase().replace(/\s+/g,'_');
  const p = document.getElementById('nu-p').value.trim();
  const r = document.getElementById('nu-r').value;
  const lw= document.getElementById('nu-l-w').style.display;
  const l = (lw!=='none') ? document.getElementById('nu-l').value : null;
  if (!n||!u||!p||!r) { alert('Completa todos los campos'); return; }
  if (DATA.users[u]) { alert('Ese usuario ya existe'); return; }
  await DB.ref(`ricopan/users/${u}`).set({ name:n, pass:p, role:r, local:l||null });
  alert('â Usuario creado');
  adminTab('usuarios', document.querySelector('.tab-btn.on'));
}
async function addLocal() {
  const n = prompt('Nombre del local:');
  if (!n?.trim()) return;
  const id = n.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  await DB.ref(`ricopan/locales/${id}`).set(n.trim());
  adminTab('locales', document.querySelector('.tab-btn.on'));
}
async function delLocal(id) {
  if (!confirm(`Â¿Eliminar local "${DATA.locales[id]}"?`)) return;
  await DB.ref(`ricopan/locales/${id}`).remove();
}
async function addProducto() {
  const n = prompt('Nombre del producto:');
  if (!n?.trim()) return;
  const p = [...(DATA.productos||[]), n.trim()];
  await DB.ref('ricopan/productos').set(p);
  adminTab('productos', document.querySelector('.tab-btn.on'));
}
async function delProducto(i) {
  const p = [...(DATA.productos||[])];
  p.splice(i,1);
  await DB.ref('ricopan/productos').set(p);
  adminTab('productos', document.querySelector('.tab-btn.on'));
}
async function limpiarCompletados() {
  if (!confirm('Â¿Eliminar todos los envÃ­os completados?')) return;
  const updates = {};
  Object.entries(DATA.envios).forEach(([id,e]) => {
    if (e.status==='completado') updates[`ricopan/envios/${id}`] = null;
  });
  await DB.ref().update(updates);
  adminTab('historial', document.querySelector('.tab-btn.on'));
}
